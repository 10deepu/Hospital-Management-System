server:
  port: 8085

spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:mysql://localhost:3306/payment_db
    username: root
    password: test

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: localhost:19092
    consumer:
      group-id: payment-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.payment_service.kafka,com.booking_service.kafka
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

stripe:
  secret-key: sk_test_51TA4dORpiXI73ps0pJBPdgBwXzYtQFrvdqEJNHngZRmui6WzgC3SIZGkGW0fSTQX0kXwBScyCtCt6eJ1cezMIWhT005phFJ9z3
  webhook-secret: whsec_4d11d5c2a789150d037a42a5479d800d442bdeff5378b87e4210e983f8273f41
  success-url: http://localhost:3000/payment-success?session_id={CHECKOUT_SESSION_ID}
  cancel-url: http://localhost:3000/payment-cancelled

management:
  endpoints:
    web:
      exposure:
        include: health,info

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

resilience4j:
  circuitbreaker:
    instances:
      bookingService:
        slidingWindowSize: 5
        minimumNumberOfCalls: 3
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      stripeService:
        slidingWindowSize: 5
        minimumNumberOfCalls: 3
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
  retry:
    instances:
      bookingService:
        maxAttempts: 3
        waitDuration: 500ms
      stripeService:
        maxAttempts: 3
        waitDuration: 500ms
