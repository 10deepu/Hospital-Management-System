server:
  port: 8080

spring:
  application:
    name: API-Gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/auth/**

            - id: doctor-service
              uri: lb://DOCTOR-SERVICE
              predicates:
                - Path=/api/doctors/**

            - id: patient-service
              uri: lb://PATIENT-SERVICE
              predicates:
                - Path=/api/patients/**

            - id: booking-service
              uri: lb://BOOKING-SERVICE
              predicates:
                - Path=/api/bookings/**

                - id: payment-service
                  uri: lb://PAYMENT-SERVICE
                  predicates:
                    - Path=/api/payments/**


management:
  endpoints:
    web:
      exposure:
        include: health,info

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: mySuperSecretKeyForJwtAuthentication123456